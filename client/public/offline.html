<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NumisVault</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e5e7eb;
      }

      .container {
        text-align: center;
        max-width: 500px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 64px;
        margin-bottom: 10px;
        color: #ffffff;
      }

      h2 {
        font-size: 22px;
        margin-bottom: 15px;
        color: #cbd5f5;
        font-weight: 500;
      }

      p {
        font-size: 15px;
        color: #94a3b8;
        margin-bottom: 25px;
        line-height: 1.6;
      }

      .status {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #dc2626;
        font-size: 12px;
        margin-bottom: 20px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #1d4ed8;
      }

      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="status">No Internet Connection</div>

      <h1>Offline</h1>
      <h2>Connection lost</h2>

      <p>
        It looks like your device is not connected to the internet.
        Please check your network settings or reconnect to continue using the application.
      </p>

      <button onclick="window.location.reload()">
        Retry Connection
      </button>

      <div class="footer">
        This page is shown when the network is unavailable.
      </div>
    </div>
  </body>
</html>
